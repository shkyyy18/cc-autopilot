name: Bug report
description: Report a reproducible AgentCron problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: agentcron doctor output
      render: shell
  - type: textarea
    attributes:
      label: Minimal config (remove secrets)
      render: json
